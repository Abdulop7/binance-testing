app = 'binance-testing-bkupkg'
primary_region = 'syd'

[build]

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = false     
  auto_start_machines = true
  min_machines_running = 1       
  processes = ['app']

  
[machines]
  min_count = 1
  max_count = 2


[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
