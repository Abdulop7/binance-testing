app = "your-fly-app-name"  # Replace with actual name

primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "100"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "stop"
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
